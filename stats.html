<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>みんなのデータ — しりすこPAD GB</title>
    <meta name="description" content="ふるり値チェッカーに提出されたデータの分布・キャラ採用率・編成ランキング。">
    <meta property="og:type" content="website">
    <meta property="og:title" content="みんなのデータ | しりすこPAD GB">
    <meta property="og:url" content="https://shirisuko-pad-gb.github.io/stats.html">
    <meta property="og:image" content="https://shirisuko-pad-gb.github.io/assets/ogp.png">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="icon" href="./assets/attr/fire.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --ink:#14161A; --sub:#6B7178; --sub2:#8A9097; --faint:#A4AAB0; --bg:#F7F8F9; --bg2:#F1F2F4; --line:rgba(20,22,26,0.05); --blue:#1E78F0; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family:'Noto Sans JP',system-ui,sans-serif; background:var(--bg); color:var(--ink); line-height:1.6; padding:0 14px calc(28px + env(safe-area-inset-bottom)); }
        .wrap { max-width:560px; margin:0 auto; }
        header { padding:22px 2px 14px; }
        .brand { font-size:12px; font-weight:900; color:var(--sub2); letter-spacing:1px; }
        h1 { font-size:24px; font-weight:900; }
        .back { font-size:12px; font-weight:900; color:var(--blue); text-decoration:none; }
        .card { background:#fff; border-radius:15px; border:1px solid var(--line); box-shadow:0 1px 4px rgba(20,22,26,0.04); padding:16px; margin-bottom:14px; }
        .card h2 { font-size:14px; font-weight:900; display:flex; align-items:center; gap:7px; margin-bottom:10px; }
        .hint { font-size:11px; color:var(--sub2); }
        .attr-tabs { display:grid; grid-template-columns:repeat(5,minmax(0,1fr)); gap:6px; margin-bottom:14px; }
        .attr-tab { display:flex; flex-direction:column; align-items:center; gap:2px; padding:8px 2px; border-radius:12px; border:1.5px solid transparent; background:var(--fa-soft); cursor:pointer; font-family:inherit; -webkit-tap-highlight-color:transparent; }
        .attr-tab img { width:22px; height:22px; }
        .attr-tab .name { font-size:10.5px; font-weight:900; color:var(--fa); white-space:nowrap; }
        .attr-tab.active { background:var(--fa); }
        .attr-tab.active .name { color:#fff; }
        .hist { display:flex; align-items:flex-end; gap:2px; height:72px; margin-top:8px; }
        .hist .bar { flex:1; background:var(--ba, var(--bg2)); border-radius:3px 3px 0 0; min-height:2px; }
        .hist-axis { display:flex; justify-content:space-between; font-size:10px; color:var(--faint); font-weight:700; margin-top:3px; }
        .dist-note { font-size:11px; color:var(--sub2); margin-top:8px; }
        .gate-note { display:flex; align-items:center; gap:8px; padding:10px 12px; border-radius:10px; background:var(--bg); font-size:12px; font-weight:700; color:var(--sub); }
        .gate-bar { flex-shrink:0; width:74px; height:6px; border-radius:999px; background:var(--bg2); overflow:hidden; }
        .gate-bar > span { display:block; height:100%; background:linear-gradient(90deg,#46A0FF,#1E78F0); }
        .char-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(52px,1fr)); gap:8px; }
        .char-cell { text-align:center; }
        .char-cell img { width:100%; aspect-ratio:1; border-radius:10px; object-fit:cover; background:var(--bg2); }
        .char-cell .pct { font-size:10px; font-weight:900; color:var(--sub); }
        .comp-row { display:flex; align-items:center; gap:8px; padding:8px; border-radius:12px; border:1.5px solid var(--bg2); background:var(--bg); margin-top:8px; }
        .comp-faces { display:flex; gap:4px; flex-shrink:0; }
        .comp-faces img { width:36px; height:36px; border-radius:8px; object-fit:cover; background:var(--bg2); }
        .comp-meta { display:flex; flex-direction:column; min-width:0; font-size:11px; color:var(--sub); font-weight:700; }
        .comp-meta strong { color:var(--ink); }
        footer { text-align:center; padding:18px 0 8px; font-size:11px; color:var(--faint); }
        .err { font-size:12px; color:var(--sub); }
    </style>
</head>
<body>
<div class="wrap">
    <header>
        <div class="brand">SHIRISUKO PAD GB</div>
        <h1>📊 みんなのデータ</h1>
        <p class="hint" style="margin-top:4px;"><a class="back" href="./">← 測定にもどる</a></p>
    </header>

    <div class="attr-tabs" id="attrTabs"></div>

    <section class="card">
        <h2>📈 ふるり値の分布</h2>
        <div id="distArea"><p class="err">読み込み中…</p></div>
    </section>

    <section class="card">
        <h2>👥 キャラ採用率</h2>
        <p class="hint" style="margin-bottom:8px;">編成つき提出 (1人1票・ベスト編成) の中で使われている割合</p>
        <div id="charsArea"><p class="err">読み込み中…</p></div>
    </section>

    <section class="card">
        <h2>🏆 編成ランキング</h2>
        <p class="hint" style="margin-bottom:4px;">採用が多い順。「中央値」がその編成の実力の目安、「最高」は上振れ記録です</p>
        <div id="compsArea"><p class="err">読み込み中…</p></div>
    </section>

    <p class="hint" style="margin:0 2px 8px;">集計ルール: 1端末につき属性ごとベスト1件・直近120日。ヒストグラムは極端値の影響を抑えるため1〜99パーセンタイルで表示。件数が少ないうちは参考値です。</p>

    <footer>
        <p>ユニオン「しりすこ」のメンバーが運営する非公式ツールです。</p>
        <p style="margin-top:4px;">© しりすこPAD GB</p>
    </footer>
</div>
<script type="module" src="./js/stats.js"></script>
</body>
</html>
