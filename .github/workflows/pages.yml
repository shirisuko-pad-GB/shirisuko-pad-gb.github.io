# GitHub Pages デプロイ (shirisu-pad と同じ Actions 方式・Jekyll 処理なし)
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run tests
        run: node tests/run-tests.mjs
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true   # 初回に Pages を自動有効化 (API 手動有効化の 404 回避)
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
